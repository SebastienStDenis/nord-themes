name: Publish

on:
  workflow_dispatch:
    inputs:
      changelog:
        description: "Changelog entry for this release (Markdown)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bump patch version
        id: version
        run: |
          new_version="$(npm version patch --no-git-tag-version)"
          echo "version=${new_version#v}" >> "$GITHUB_OUTPUT"

      - name: Prepend changelog entry
        env:
          VERSION: ${{ steps.version.outputs.version }}
          CHANGELOG_ENTRY: ${{ inputs.changelog }}
        run: node ./scripts/update-changelog.js

      - name: Publish to Open VSX
        run: npx ovsx publish -p "$OVSX_TOKEN"
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}

      - name: Commit version bump and changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "Release ${VERSION}"
          git push origin HEAD:main

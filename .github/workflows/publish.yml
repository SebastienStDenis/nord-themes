name: Publish

# Manual-only release. This never runs automatically — a maintainer triggers it
# from the Actions tab, selecting the `main` branch, and types the changelog
# entry for the version currently in package.json.
on:
  workflow_dispatch:
    inputs:
      changelog:
        description: "Changelog entry for this release (Markdown, one bullet per line)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    # Guard: only ever publish from main, even if someone picks another branch.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Read version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Prepend changelog entry
        env:
          VERSION: ${{ steps.version.outputs.version }}
          CHANGELOG_ENTRY: ${{ inputs.changelog }}
        run: node ./scripts/update-changelog.js

      - name: Commit changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG.md already up to date; nothing to commit."
          else
            git add CHANGELOG.md
            git commit -m "Update changelog for v${VERSION}"
            git push
          fi

      - name: Publish to Open VSX
        run: npx ovsx publish -p "$OVSX_TOKEN"
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
